  <script type="text/javascript">

    // 基于您上传的图片提取的31省市“211”录取率数据（已做升序排列）

  { name: '河南', value: 4.20 }, { name: '浙江', value: 4.30 }, { name: '河北', value: 4.40 },

  { name: '湖南', value: 4.50 }, { name: '广西', value: 4.60 }, { name: '山西', value: 4.70 },

];

option = {

  backgroundColor: 'transparent',
  
  title: {
    text: '全国各省 211高校 录取率阶梯',
    subtext: '全国平均录取率：4.40%\n数据来源：统计局，教育部，各省教育厅，国金证券研究所',

  // 古风卷轴交互提示框

      shadowStyle: { color: 'rgba(238, 230, 203, 0.3)' } // 极淡的宣纸底色阴影
    },
    backgroundColor: 'rgba(244, 238, 224, 0.95)',
    borderColor: '#bca98f',

  // X轴（横向数值轴）：隐藏所有线条
  xAxis: {
    type: 'value',
    name: '(录取率 %)',
    nameTextStyle: {
      fontFamily: 'KaiTi, SimSun, serif',
      color: '#8b6b55',
      align: 'right'
    },
    axisLine: { show: false },
    axisTick: { show: false },
    splitLine: { show: false }, // 取消网格线，制造留白写意感
    axisLabel: { show: false }

  // Y轴（省份名称）
  yAxis: {
    type: 'category',
    data: rawData.map(item => item.name),
    axisLine: { show: false },
    axisTick: { show: false },
    axisLabel: {

    }
  },

  series: [

      label: {

        position: 'right',
        formatter: '{c}%',
        fontFamily: 'KaiTi, SimSun, serif',
        color: '#5c3a21',

      },

        borderWidth: 0,

        // 根据211录取率的阶梯，动态分配色卡颜色
        color: function(params) {
          const val = params.value;
          if (val >= 10.0) {
            return '#B73F42'; // 胭脂红 (极高录取率：北京/上海/西藏/天津/青海)
          } else if (val >= 7.0) {
            return '#DC6B62'; // 水红 (较高录取率区间)

            return '#DE9960'; // 赭石 (高于或等于全国平均线)

            return '#82B29B'; // 石绿 (略低于平均线，竞争激烈区)
          } else {
            return '#436C85'; // 苍青/莫兰迪蓝 (地狱难度：广东/甘肃)
          }
        },
        // 动态设置对应的水彩晕染阴影颜色

          const val = params.value;
          if (val >= 10.0) return 'rgba(183, 63, 66, 0.4)';

          if (val >= 5.01) return 'rgba(222, 153, 96, 0.4)';
          if (val >= 4.0) return 'rgba(130, 178, 155, 0.4)';
          return 'rgba(67, 108, 133, 0.4)';

        ]
      }
