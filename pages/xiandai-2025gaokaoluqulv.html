  <script type="text/javascript">
    var dom = document.getElementById('container');
    var myChart = echarts.init(dom, null, {
      renderer: 'canvas',
      useDirtyRect: false
    });
    var app = {};
    
    var option;

    // 采用递减的视觉伪值（100至10）来支撑梯形美感，真实数据在外挂字段中存储
const funnelData = [
  {
    value: 100, name: '全国适龄人口', realValue: '1594万人', pct: '100%',
    itemStyle: { color: '#EEE6CB', shadowColor: 'rgba(238,230,203,0.9)' } // 牙黄
  },
  {
    value: 85, name: '全国高考人数', realValue: '1335万人', pct: '83.75%',
    itemStyle: { color: '#82B29B', shadowColor: 'rgba(130,178,155,0.9)' } // 石绿
  },
  {
    value: 70, name: '本科录取', realValue: '约480万人', pct: '30.11%',
    itemStyle: { color: '#436C85', shadowColor: 'rgba(67,108,133,0.9)' } // 苍青
  },
  {
    value: 55, name: '一本录取', realValue: '约174万人', pct: '10.91%',

  {

  },
  {
    value: 25, name: '985录取', realValue: '约22.5万人', pct: '1.40%',

  },
  {
    value: 10, name: '清北录取', realValue: '约0.85万人', pct: '0.05%',
    itemStyle: { color: '#B73F42', shadowColor: 'rgba(183,63,66,0.9)' } // 胭脂红 (极度窄门)
  }
];

option = {
  // 预设透明底色，无缝融入您的 H5 宣纸肌理背景
  backgroundColor: 'transparent',

  title: [
    {
      text: '2025年现代高考过筛漏斗',
      subtext: '从千万适龄人口到清北金字塔尖的残酷淘汰率',
      left: 'center',
      top: '2%',
      textStyle: { fontFamily: 'KaiTi, SimSun, serif', fontSize: 24, color: '#436C85' },
      subtextStyle: { fontFamily: 'KaiTi, SimSun, serif', fontSize: 14, color: '#8b6b55' }
    },
    {
      // 底部备注严格落实
      text: '数据来源：统计局，各省教育厅，国金证券研究所',
      left: 'center',
      bottom: '1%',
      textStyle: { fontFamily: 'KaiTi, SimSun, serif', fontSize: 13, color: '#8b6b55', fontWeight: 'normal' }
    }
  ],

  // 古风宣纸交互提示框
  tooltip: {
    trigger: 'item',
    backgroundColor: 'rgba(244, 238, 224, 0.95)',
    borderColor: '#bca98f',
    borderWidth: 1,
    padding: [15, 20],
    formatter: function (params) {
      return `<b style="font-size:16px; color:${params.color}">${params.name}</b><br/><br/>` +
             `录取规模：<b style="color:#B73F42; font-size:15px;">${params.data.realValue}</b><br/>` +
             `同龄占比：<span style="color:#8b6b55; font-size:14px;">${params.data.pct}</span>`;
    }
  },

  series: [
    {
      name: '高考录取比例',
      type: 'funnel',
      left: '8%',
      width: '55%', // 左侧压缩漏斗宽度，给右侧的文字标签留出足够的呼吸空间
      top: '14%',
      bottom: '10%',
      gap: 5, // 梯形间距，呈现水彩散开的效果
      sort: 'descending',

      // 右侧引线标签配置
      label: {
        show: true,
        position: 'right', // 标签在外侧，避免底部色块过窄挡住文字
        formatter: function (params) {
          // 自定义标签内容，屏蔽虚假的value，渲染真实的规模与占比
          return `{name|${params.name}}\n{val|${params.data.realValue}}  {pct|${params.data.pct}}`;
        },
        rich: {
          name: { fontSize: 15, fontFamily: 'KaiTi, SimSun, serif', fontWeight: 'bold', color: '#5c3a21', padding: [0, 0, 5, 0] },
          val: { fontSize: 14, fontFamily: 'KaiTi, SimSun, serif', color: '#B73F42', fontWeight: 'bold' },

        }

      labelLine: {
        length: 25,
        lineStyle: {
          width: 1,
          type: 'dashed',
          color: 'rgba(139, 107, 85, 0.5)' // 虚线引线，增加古风编排感

      // 极致水彩视觉规范
      itemStyle: {
        borderWidth: 0,
        shadowBlur: 25,
        shadowOffsetY: 3,
        opacity: 0.85
      },
      data: funnelData
    }
  ]
};

    if (option && typeof option === 'object') {
      myChart.setOption(option);
    }

    window.addEventListener('resize', myChart.resize);
