<html lang="en" style="height: 100%">
<head>
  <meta charset="utf-8">
</head>
<body style="height: 100%; margin: 0">
  <div id="container" style="height: 100%"></div>

  
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  
  <!-- Uncomment this line if you want to dataTool extension
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/extension/dataTool.min.js"></script>

  <!-- Uncomment this line if you want to use gl extension
  <script type="text/javascript" src="https://echarts.apache.org/zh/js/vendors/echarts-gl/dist/echarts-gl.min.js"></script>
  -->
  <!-- Uncomment this line if you want to echarts-stat extension
  <script type="text/javascript" src="https://echarts.apache.org/zh/js/vendors/echarts-stat/dist/ecStat.min.js"></script>
  -->
  <!-- Uncomment this line if you want to echarts-graph-modularity extension
  <script type="text/javascript" src="https://echarts.apache.org/zh/js/vendors/echarts-graph-modularity/dist/echarts-graph-modularity.min.js"></script>
  -->
  <!-- Uncomment this line if you want to use map
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@4.9.0/map/js/world.js"></script>
  -->
  <!-- Uncomment these two lines if you want to use bmap extension
  <script type="text/javascript" src="https://api.map.baidu.com/api?v=3.0&ak=YOUR_API_KEY"></script>
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/extension/bmap.min.js"></script>
  -->

  <script type="text/javascript">
    var dom = document.getElementById('container');
    var myChart = echarts.init(dom, null, {
      renderer: 'canvas',
      useDirtyRect: false
    });
    var app = {};
    
    var option;

    // 基于您上传的图片提取的31省市“清北”录取率数据（千分比‰，已做升序排列）
// 注：除原图明确标注的数值外，其余为依据原图柱体高度的合理估算值
const rawData = [
  { name: '云南', value: 0.34 }, { name: '贵州', value: 0.35 }, { name: '广东', value: 0.35 },
  { name: '广西', value: 0.40 }, { name: '河南', value: 0.40 }, { name: '甘肃', value: 0.45 },
  { name: '安徽', value: 0.45 }, { name: '江西', value: 0.50 }, { name: '山东', value: 0.50 },
  { name: '内蒙古', value: 0.55 }, { name: '四川', value: 0.55 }, { name: '河北', value: 0.65 },
  { name: '山西', value: 0.70 }, 
  // --- 全国平均线 0.72‰ ---
  { name: '新疆', value: 0.75 }, { name: '陕西', value: 0.75 }, { name: '湖南', value: 0.75 },
  { name: '重庆', value: 0.80 }, { name: '黑龙江', value: 0.80 }, { name: '湖北', value: 0.80 },
  { name: '海南', value: 0.85 }, { name: '西藏', value: 0.85 }, { name: '江苏', value: 0.88 },
  { name: '宁夏', value: 0.90 }, { name: '福建', value: 0.95 }, { name: '青海', value: 1.00 },
  { name: '吉林', value: 1.05 }, { name: '浙江', value: 1.20 }, { name: '辽宁', value: 1.22 },
  { name: '天津', value: 2.79 }, { name: '上海', value: 4.31 }, { name: '北京', value: 9.13 }
];

option = {
  // 透明底色，无缝融入H5背景
  backgroundColor: 'transparent',
  
  title: {
    text: '全国各省 清华北大 录取率阶梯',
    subtext: '全国平均录取率：0.72‰\n数据来源：统计局，教育部，各省教育厅，国金证券研究所',
    left: 'center',
    top: '1%',
    textStyle: {
      fontFamily: 'KaiTi, SimSun, serif',
      fontSize: 24,
      color: '#5c3a21' // 暗褐墨色
    },
    subtextStyle: {
      fontFamily: 'KaiTi, SimSun, serif',
      fontSize: 14,
      color: '#8b6b55',
      lineHeight: 20
    }
  },

  // 古风卷轴交互提示框（注意单位是千分号 ‰）
  tooltip: {
    trigger: 'axis',
    axisPointer: {
      type: 'shadow',
      shadowStyle: { color: 'rgba(238, 230, 203, 0.3)' } 
    },
    backgroundColor: 'rgba(244, 238, 224, 0.95)',
    borderColor: '#bca98f',
    borderWidth: 1,
    textStyle: {
      color: '#5c3a21',
      fontFamily: 'KaiTi, SimSun, serif'
    },
    formatter: function(params) {
      return `<b>${params[0].name}</b> : ${params[0].value.toFixed(2)}‰`;
    }
  },

  // 画布边距调整
  grid: {
    left: '5%',
    right: '12%', 
    bottom: '5%',
    top: '12%',
    containLabel: true
  },

  // X轴（横向数值轴）：隐藏所有线条
  xAxis: {
    type: 'value',
    name: '(录取率 ‰)',
    nameTextStyle: {
      fontFamily: 'KaiTi, SimSun, serif',
      color: '#8b6b55',
      align: 'right'
    },
    axisLine: { show: false },
    axisTick: { show: false },
    splitLine: { show: false }, 
    axisLabel: { show: false }  
  },

  // Y轴（省份名称）
  yAxis: {
    type: 'category',
    data: rawData.map(item => item.name),
    axisLine: { show: false },
    axisTick: { show: false },
    axisLabel: {
      fontFamily: 'KaiTi, SimSun, serif',
      color: '#5c3a21',
      fontSize: 13,
      margin: 15
    }
  },

  series: [
    {
      name: '清北录取率',
      type: 'bar',
      barWidth: '55%', 
      
      // 直接在柱子右侧显示千分比数值
      label: {
        show: true,
        position: 'right',
        formatter: '{c}‰',
        fontFamily: 'KaiTi, SimSun, serif',
        color: '#5c3a21',
        fontSize: 12
      },

      // 核心：水彩样式与色彩分级（依据清北千分比录取率重新标定阈值）
      itemStyle: {
        borderRadius: [0, 10, 10, 0], 
        borderWidth: 0,
        shadowBlur: 10,
        shadowOffsetX: 2,
        shadowOffsetY: 3,
        // 动态分配色卡颜色
        color: function(params) {
          const val = params.value;
          if (val >= 2.5) {
            return '#B73F42'; // 胭脂红 (顶端王者：北京、上海、天津)
          } else if (val >= 1.0) {
            return '#DC6B62'; // 水红 (破千分之一的较优梯队)
          } else if (val >= 0.72) {
            return '#DE9960'; // 赭石 (高于或等于全国平均线)
          } else if (val >= 0.5) {
            return '#82B29B'; // 石绿 (竞争白热化区域)
          } else {
            return '#436C85'; // 苍青/莫兰迪蓝 (低于千分之零点五的至暗地狱难度)
          }
        },
        // 动态设置对应的水彩晕染阴影颜色
        shadowColor: function(params) {
          const val = params.value;
          if (val >= 2.5) return 'rgba(183, 63, 66, 0.4)';
          if (val >= 1.0) return 'rgba(220, 107, 98, 0.4)';
          if (val >= 0.72) return 'rgba(222, 153, 96, 0.4)';
          if (val >= 0.5) return 'rgba(130, 178, 155, 0.4)';
          return 'rgba(67, 108, 133, 0.4)';
        }
      },
      
      data: rawData.map(item => item.value),

      // 绘制全国平均线 (0.72‰)
      markLine: {
        symbol: ['none', 'none'],
        label: {
          show: true,
          position: 'insideEndTop',
          formatter: '全国平均线\n0.72‰',
          fontFamily: 'KaiTi, SimSun, serif',
          color: '#B73F42',
          fontSize: 13,
          padding: [0, 0, 10, -50] 
        },
        lineStyle: {
          color: '#B73F42', // 胭脂红警戒线
          type: 'dashed',
          width: 2,
          opacity: 0.6
        },
        data: [
          { xAxis: 0.72 }
        ]
      }
    }
  ]
};

    if (option && typeof option === 'object') {
      myChart.setOption(option);
    }

    window.addEventListener('resize', myChart.resize);
  </script>
</body>
</html>
