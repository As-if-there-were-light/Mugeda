<!DOCTYPE html>
<html lang="en" style="height: 100%">
<head>
  <meta charset="utf-8">
</head>
<body style="height: 100%; margin: 0">
  <div id="container" style="height: 100%"></div>

  
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  
  <!-- Uncomment this line if you want to dataTool extension
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/extension/dataTool.min.js"></script>
  -->
  <!-- Uncomment this line if you want to use gl extension
  <script type="text/javascript" src="https://echarts.apache.org/zh/js/vendors/echarts-gl/dist/echarts-gl.min.js"></script>
  -->
  <!-- Uncomment this line if you want to echarts-stat extension
  <script type="text/javascript" src="https://echarts.apache.org/zh/js/vendors/echarts-stat/dist/ecStat.min.js"></script>
  -->
  <!-- Uncomment this line if you want to echarts-graph-modularity extension
  <script type="text/javascript" src="https://echarts.apache.org/zh/js/vendors/echarts-graph-modularity/dist/echarts-graph-modularity.min.js"></script>
  -->
  <!-- Uncomment this line if you want to use map
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@4.9.0/map/js/world.js"></script>
  -->
  <!-- Uncomment these two lines if you want to use bmap extension
  <script type="text/javascript" src="https://api.map.baidu.com/api?v=3.0&ak=YOUR_API_KEY"></script>
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/extension/bmap.min.js"></script>
  -->

  <script type="text/javascript">
    var dom = document.getElementById('container');
    var myChart = echarts.init(dom, null, {
      renderer: 'canvas',
      useDirtyRect: false
    });
    var app = {};
    
    var option;

    // 提取自文档的真实数据
const categories = ['<20岁/25岁', '20-24/25-29岁', '25-29/30-34岁', '30-34/35-39岁', '35-39/40-49岁', '≥40岁/50岁'];

// 乡试及第年龄占比 (%) 
const xiangshiData = [10.3, 31.5, 25.4, 16.0, 10.3, 6.5]; // 最后两项 40-49(4.2) 和 ≥50(2.3) 合并为 ≥40岁

// 殿试及第年龄占比 (%)
const dianshiData = [7.0, 23.5, 30.0, 21.6, 14.1, 3.8]; 

option = {
  // 核心：透明背景，完美融入 H5 宣纸底图
  backgroundColor: 'transparent',
  
  title: [
    {
      text: '岁月折痕：清代一甲精英及第年龄推演',
      subtext: '乡试与殿试及第群体的年龄区间分布 (占比 %)',
      left: 'center',
      top: '2%',
      textStyle: { fontFamily: 'KaiTi, SimSun, serif', fontSize: 24, color: '#5c3a21' },
      subtextStyle: { fontFamily: 'KaiTi, SimSun, serif', fontSize: 14, color: '#8b6b55' }
    },
    {
      text: '数据来源：基于《中华科举库》清代212名一甲进士数据自采',
      left: 'center',
      bottom: '1%',
      textStyle: { fontFamily: 'KaiTi, SimSun, serif', fontSize: 12, color: '#8b6b55', fontWeight: 'normal' }
    }
  ],

  // 古风宣纸交互提示框
  tooltip: {
    trigger: 'axis',
    backgroundColor: 'rgba(244, 238, 224, 0.95)',
    borderColor: '#bca98f',
    borderWidth: 1,
    padding: [10, 15],
    textStyle: { fontFamily: 'KaiTi, SimSun, serif', color: '#5c3a21' },
    formatter: function (params) {
      // 巧妙处理坐标轴双重标签的问题
      let title = params[0].axisValue;
      let ageX = title.split('/')[0];
      let ageD = title.split('/')[1];
      
      let html = `<b style="font-size:16px;">年龄切片分析</b><br/><br/>`;
      params.forEach(p => {
        let ageLabel = (p.seriesName === '乡试及第') ? ageX : ageD;
        html += `${p.marker} <b>${p.seriesName} (${ageLabel})</b>: <span style="color:#B73F42; font-weight:bold;">${p.value}%</span><br/>`;
      });
      return html;
    }
  },

  legend: {
    top: '12%',
    data: ['乡试及第', '殿试及第'],
    textStyle: { fontFamily: 'KaiTi, SimSun, serif', color: '#5c3a21', fontSize: 14 }
  },

  grid: {
    left: '10%',
    right: '10%',
    bottom: '15%',
    top: '22%',
    containLabel: true
  },

  xAxis: {
    type: 'category',
    boundaryGap: false,
    data: categories,
    axisLine: { lineStyle: { color: 'rgba(139, 107, 85, 0.4)' } },
    axisTick: { show: false },
    axisLabel: { 
      fontFamily: 'KaiTi, SimSun, serif', 
      color: '#5c3a21',
      fontWeight: 'bold',
      // 将底部的双重标签折行显示，更美观
      formatter: function(value) {
         let parts = value.split('/');
         return '{xiang|' + parts[0] + '}\n{dian|' + parts[1] + '}';
      },
      rich: {
         xiang: { color: '#82B29B', fontSize: 12, padding: [0,0,2,0] },
         dian: { color: '#B73F42', fontSize: 12 }
      }
    }
  },

  yAxis: {
    type: 'value',
    splitLine: { lineStyle: { type: 'dashed', color: 'rgba(139, 107, 85, 0.2)' } },
    axisLabel: { fontFamily: 'KaiTi, SimSun, serif', color: '#5c3a21', formatter: '{value}%' }
  },

  series: [
    {
      name: '乡试及第',
      type: 'line',
      smooth: true,
      symbol: 'none',
      data: xiangshiData,
      lineStyle: {
        width: 3,
        color: '#82B29B', // 石绿
        shadowColor: 'rgba(130, 178, 155, 0.6)',
        shadowBlur: 10
      },
      areaStyle: {
        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
          { offset: 0, color: 'rgba(130, 178, 155, 0.6)' },
          { offset: 1, color: 'rgba(177, 213, 201, 0.1)' } // 渐变至浅水绿
        ])
      }
    },
    {
      name: '殿试及第',
      type: 'line',
      smooth: true,
      symbol: 'none',
      data: dianshiData,
      lineStyle: {
        width: 3,
        color: '#B73F42', // 胭脂红
        shadowColor: 'rgba(183, 63, 66, 0.6)',
        shadowBlur: 10
      },
      areaStyle: {
        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
          { offset: 0, color: 'rgba(183, 63, 66, 0.6)' },
          { offset: 1, color: 'rgba(222, 153, 96, 0.1)' } // 渐变至赭石
        ])
      }
    }
  ]
};

    if (option && typeof option === 'object') {
      myChart.setOption(option);
    }

    window.addEventListener('resize', myChart.resize);
  </script>
</body>
</html>
