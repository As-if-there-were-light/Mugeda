<!DOCTYPE html>
<html lang="en" style="height: 100%">
<head>
  <meta charset="utf-8">
</head>
<body style="height: 100%; margin: 0">
  <div id="container" style="height: 100%"></div>

  
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  
  <!-- Uncomment this line if you want to dataTool extension
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/extension/dataTool.min.js"></script>
  -->
  <!-- Uncomment this line if you want to use gl extension
  <script type="text/javascript" src="https://echarts.apache.org/zh/js/vendors/echarts-gl/dist/echarts-gl.min.js"></script>
  -->
  <!-- Uncomment this line if you want to echarts-stat extension
  <script type="text/javascript" src="https://echarts.apache.org/zh/js/vendors/echarts-stat/dist/ecStat.min.js"></script>
  -->
  <!-- Uncomment this line if you want to echarts-graph-modularity extension
  <script type="text/javascript" src="https://echarts.apache.org/zh/js/vendors/echarts-graph-modularity/dist/echarts-graph-modularity.min.js"></script>
  -->
  <!-- Uncomment this line if you want to use map
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@4.9.0/map/js/world.js"></script>
  -->
  <!-- Uncomment these two lines if you want to use bmap extension
  <script type="text/javascript" src="https://api.map.baidu.com/api?v=3.0&ak=YOUR_API_KEY"></script>
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/extension/bmap.min.js"></script>
  -->

  <script type="text/javascript">
    var dom = document.getElementById('container');
    var myChart = echarts.init(dom, null, {
      renderer: 'canvas',
      useDirtyRect: false
    });
    var app = {};
    
    var option;

    // 1. 严格提取自《高考时间沉没成本调查》问卷的百分比数据
const workdaySleep = [15.33, 28.67, 38.00, 14.67, 3.33];  // 工作日睡眠：≤6h, 6-7h, 7-8h, 8-9h, ≥9h
const weekendSleep = [12.67, 22.00, 36.00, 20.00, 9.33];   // 周末睡眠：同上

const workdayTutor = [10.67, 22.67, 25.33, 28.00, 13.33];  // 工作日补习：无, ≤0.5h, 0.5-1h, 1-2h, ≥2h
const weekendTutor = [15.33, 22.67, 33.33, 18.67, 10.00];  // 周末补习：无, ≤2h, 2-4h, 4-6h, ≥6h

// 2. 坐标轴标签精细化映射
const sleepLabels = ['极度匮乏 (≤6小时)', '偏少 (6-7小时)', '适中 (7-8小时)', '充足 (8-9小时)', '极度充沛 (≥9小时)'];
const weekdayTutorLabels = ['无补习', '微量 (≤0.5小时)', '轻度 (0.5-1小时)', '中度 (1-2小时)', '重度 (≥2小时)'];
const weekendTutorLabels = ['无补习', '轻度 (≤2小时)', '中度 (2-4小时)', '高度 (4-6小时)', '极度 (≥6小时)'];

option = {
  // 核心：预设透明底色，完美融入 H5 宣纸底图
  backgroundColor: 'transparent',
  
  // 组合标题与数据来源备注
  title: [
    {
      text: '时间账本的“围城”：睡眠挤压与课外补习双向对比',
      subtext: '左侧 ➔ 工作日投入度  |  右侧 ➔ 周末投入度（数据呈现为群体占比 %）',
      left: 'center',
      top: '2%',
      textStyle: { fontFamily: 'KaiTi, SimSun, serif', fontSize: 23, color: '#5c3a21' },
      subtextStyle: { fontFamily: 'KaiTi, SimSun, serif', fontSize: 14, color: '#8b6b55' }
    },
    {
      // 严格落实：数据来源备注
      text: '数据来源：问卷自采数据 (N=150)',
      left: 'center',
      bottom: '1%',
      textStyle: { fontFamily: 'KaiTi, SimSun, serif', fontSize: 12, color: '#8b6b55', fontWeight: 'normal' }
    }
  ],

  // 古风宣纸交互提示框
  tooltip: {
    trigger: 'axis',
    axisPointer: { type: 'shadow' },
    backgroundColor: 'rgba(244, 238, 224, 0.96)', // 带有宣纸微黄厚度感的底色
    borderColor: '#bca98f',
    borderWidth: 1,
    padding: [12, 16],
    textStyle: { fontFamily: 'KaiTi, SimSun, serif', color: '#5c3a21', fontSize: 14 },
    formatter: function(params) {
       let html = `<b style="font-size:16px; color:#5c3a21;">时间分配切片分析</b><br/><br/>`;
       params.forEach(p => {
           let val = Math.abs(p.value); // 将底层的负数转换为正常正数百分比展现
           html += `${p.marker} ${p.seriesName} [${p.axisValue}]: <span style="font-weight:bold; color:#B73F42;">${val}%</span><br/>`;
       });
       return html;
    }
  },

  legend: {
    top: '11%',
    data: ['工作日睡眠时长', '周末睡眠时长', '工作日补习时长', '周末补习时长'],
    textStyle: { fontFamily: 'KaiTi, SimSun, serif', color: '#5c3a21', fontSize: 13 }
  },

  // 核心排版：划分上下两组独立的对比网格（无生硬外边框）
  grid: [
    { top: '22%', height: '32%', left: '16%', right: '16%' }, // 上半部分：睡眠网格
    { bottom: '13%', height: '32%', left: '16%', right: '16%' } // 下半部分：补习网格
  ],

  xAxis: [
    { gridIndex: 0, type: 'value', min: -45, max: 45, show: false }, // 隐藏轴线，营造水墨留白意境
    { gridIndex: 1, type: 'value', min: -45, max: 45, show: false }
  ],

  yAxis: [
    // 睡眠维度（左右对称标签）
    {
      gridIndex: 0, type: 'category', data: sleepLabels, position: 'left', inverse: true,
      axisLine: { show: false }, axisTick: { show: false },
      axisLabel: { fontFamily: 'KaiTi, SimSun, serif', color: '#436C85', fontWeight: 'bold', fontSize: 13 }
    },
    {
      gridIndex: 0, type: 'category', data: sleepLabels, position: 'right', inverse: true,
      axisLine: { show: false }, axisTick: { show: false },
      axisLabel: { fontFamily: 'KaiTi, SimSun, serif', color: '#82B29B', fontWeight: 'bold', fontSize: 13 }
    },
    // 补习维度（关键：左侧对应工作日区间，右侧对应周末区间，准确反映数据）
    {
      gridIndex: 1, type: 'category', data: weekdayTutorLabels, position: 'left', inverse: true,
      axisLine: { show: false }, axisTick: { show: false },
      axisLabel: { fontFamily: 'KaiTi, SimSun, serif', color: '#B73F42', fontWeight: 'bold', fontSize: 13 }
    },
    {
      gridIndex: 1, type: 'category', data: weekendTutorLabels, position: 'right', inverse: true,
      axisLine: { show: false }, axisTick: { show: false },
      axisLabel: { fontFamily: 'KaiTi, SimSun, serif', color: '#DE9960', fontWeight: 'bold', fontSize: 13 }
    }
  ],

  series: [
    // ------------------ 【睡眠块】 ------------------
    {
      name: '工作日睡眠时长',
      type: 'bar',
      xAxisIndex: 0, yAxisIndex: 0,
      stack: 'sleep',
      data: workdaySleep.map(v => -v), // 负数向左生长
      itemStyle: {
        color: '#436C85', // 苍青
        borderWidth: 0,   // 严格无边框
        borderRadius: [4, 0, 0, 4],
        shadowBlur: 20,
        shadowColor: 'rgba(67, 108, 133, 0.45)', // 水彩晕染阴影
        shadowOffsetY: 2
      },
      label: { 
        show: true, position: 'left', 
        formatter: (p) => Math.abs(p.value).toFixed(2) + '%', 
        color: '#436C85', fontFamily: 'KaiTi, serif', fontWeight: 'bold' 
      }
    },
    {
      name: '周末睡眠时长',
      type: 'bar',
      xAxisIndex: 0, yAxisIndex: 1,
      stack: 'sleep',
      data: weekendSleep, // 正数向右生长
      itemStyle: {
        color: '#82B29B', // 石绿
        borderWidth: 0,
        borderRadius: [0, 4, 4, 0],
        shadowBlur: 20,
        shadowColor: 'rgba(130, 178, 155, 0.45)',
        shadowOffsetY: 2
      },
      label: { 
        show: true, position: 'right', 
        formatter: (p) => p.value.toFixed(2) + '%', 
        color: '#82B29B', fontFamily: 'KaiTi, serif', fontWeight: 'bold' 
      }
    },

    // ------------------ 【补习块】 ------------------
    {
      name: '工作日补习时长',
      type: 'bar',
      xAxisIndex: 1, yAxisIndex: 2,
      stack: 'tutor',
      data: workdayTutor.map(v => -v),
      itemStyle: {
        color: '#B73F42', // 胭脂红
        borderWidth: 0,
        borderRadius: [4, 0, 0, 4],
        shadowBlur: 20,
        shadowColor: 'rgba(183, 63, 66, 0.45)',
        shadowOffsetY: 2
      },
      label: { 
        show: true, position: 'left', 
        formatter: (p) => Math.abs(p.value).toFixed(2) + '%', 
        color: '#B73F42', fontFamily: 'KaiTi, serif', fontWeight: 'bold' 
      }
    },
    {
      name: '周末补习时长',
      type: 'bar',
      xAxisIndex: 1, yAxisIndex: 3,
      stack: 'tutor',
      data: weekendTutor,
      itemStyle: {
        color: '#DE9960', // 赭石
        borderWidth: 0,
        borderRadius: [0, 4, 4, 0],
        shadowBlur: 20,
        shadowColor: 'rgba(222, 153, 96, 0.45)',
        shadowOffsetY: 2
      },
      label: { 
        show: true, position: 'right', 
        formatter: (p) => p.value.toFixed(2) + '%', 
        color: '#DE9960', fontFamily: 'KaiTi, serif', fontWeight: 'bold' 
      }
    }
  ]
};

    if (option && typeof option === 'object') {
      myChart.setOption(option);
    }

    window.addEventListener('resize', myChart.resize);
  </script>
</body>
</html>
