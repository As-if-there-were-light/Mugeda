  <script type="text/javascript">
    var dom = document.getElementById('container');
    var myChart = echarts.init(dom, null, {
      renderer: 'canvas',
      useDirtyRect: false
    });
    var app = {};
    
    var option;

    option = {
  // 设置透明背景，方便在H5中叠加到你的水彩宣纸背景图上
  backgroundColor: 'transparent',
  
  // 标题设置（带有古风字体配置）
  title: {
    text: '清代一甲进士“乡试到殿试”时间跨度',
    subtext: '科举的时间沉没成本（样本数：212人）',
    left: 'center',
    top: '5%',
    textStyle: {
      fontFamily: 'KaiTi, SimSun, serif', // 优先使用楷体和宋体
      fontSize: 22,
      color: '#5c3a21', // 古典暗木色
      fontWeight: 'normal'
    },
    subtextStyle: {
      fontFamily: 'KaiTi, SimSun, serif',
      fontSize: 14,
      color: '#8b6b55'
    }
  },
  
  // 提示框组件：鼠标悬浮时的样式，设计成类似古风小卷轴的颜色
  tooltip: {
    trigger: 'item',
    formatter: '{a} <br/>{b} : {c}人 ({d}%)',
    backgroundColor: 'rgba(244, 238, 224, 0.9)', // 宣纸质感的底色
    borderColor: '#bca98f', // 边框颜色
    borderWidth: 1,
    textStyle: {
      color: '#5c3a21',
      fontFamily: 'KaiTi, SimSun, serif'
    }
  },
  
  // 图例设置
  legend: {
    bottom: '5%',
    left: 'center',
    textStyle: {
      fontFamily: 'KaiTi, SimSun, serif',
      color: '#5c3a21'
    }
  },
  
  // 核心数据与图形配置
  series: [
    {
      name: '时间跨度',
      type: 'pie',
      radius: ['15%', '65%'], // 内圈和外圈的半径，控制玫瑰图大小
      center: ['50%', '50%'],
      roseType: 'radius', // 使用半径模式的玫瑰图
      
      // 核心水彩风格化设置
      itemStyle: {
        borderRadius: 8, // 扇形边缘圆角，使其显得柔和不生硬

        shadowColor: 'rgba(0, 0, 0, 0.15)', // 柔和的阴影颜色
        shadowOffsetX: 0,
        shadowOffsetY: 5
      },
      
      // 标签文字设置
      label: {
        show: true,
        formatter: '{b}\n{c}人',
        fontFamily: 'KaiTi, SimSun, serif',
        color: '#5c3a21',
        fontSize: 14
      },
      labelLine: {
        lineStyle: {
          color: '#bca98f', // 引导线的颜色

        },

      },
      
      // 数据录入与定制化颜色配置 (颜色从浅到深隐喻时间的沉重)

        { value: 60, name: '0-2年', itemStyle: { color: '#d9cdb6' } }, // 浅雅米黄：时间短，最轻松
        { value: 46, name: '3-4年', itemStyle: { color: '#a0b4b1' } }, // 水彩淡青
        { value: 17, name: '5-6年', itemStyle: { color: '#c7b08e' } }, // 沉灰绿
        { value: 41, name: '7-9年', itemStyle: { color: '#c68d7f' } }, // 褪色水红：时间开始变长，有了一点艰辛感
        { value: 38, name: '10-14年', itemStyle: { color: '#885c4e' } }, // 赭红/暗红：时间长，沉重
        { value: 11, name: '15年及以上', itemStyle: { color: '#4a3124' } } // 焦褐木色：极度漫长的煎熬
      ]
    }
  ]
};
