<head>

<body style="height: 100%; margin: 0">
  <div id="container" style="height: 100%"></div>

  
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

  <!-- Uncomment this line if you want to use gl extension

  <!-- Uncomment this line if you want to echarts-stat extension
  <script type="text/javascript" src="https://echarts.apache.org/zh/js/vendors/echarts-stat/dist/ecStat.min.js"></script>
  -->
  <!-- Uncomment this line if you want to echarts-graph-modularity extension
  <script type="text/javascript" src="https://echarts.apache.org/zh/js/vendors/echarts-graph-modularity/dist/echarts-graph-modularity.min.js"></script>

  <!-- Uncomment this line if you want to use map

  -->
  <!-- Uncomment these two lines if you want to use bmap extension
  <script type="text/javascript" src="https://api.map.baidu.com/api?v=3.0&ak=YOUR_API_KEY"></script>
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/extension/bmap.min.js"></script>
  -->

  <script type="text/javascript">
    var dom = document.getElementById('container');
    var myChart = echarts.init(dom, null, {
      renderer: 'canvas',
      useDirtyRect: false
    });
    var app = {};
    
    var option;

    // 基于1779条文献数据提取的词频与情绪映射
// val (数值) 决定了气泡和文字的大小，依据您数据中该词的情绪典型程度进行了设定
const wordData = [
  // --- 备考类 (中性为主，伴随疲惫失落) ---
  { name: '寒窗', val: 95, type: '备考类', desc: '中性占比最高 (94.94%)，失落4.11%。客观描述漫长岁月的平淡与艰辛。', color: '#82B29B' }, // 石绿
  { name: '考场', val: 80, type: '备考类', desc: '失落情绪占 8.7%。反映应试压力与紧张感。', color: '#b1d5c9' }, // 浅水绿
  { name: '应试', val: 75, type: '备考类', desc: '失落情绪占 9.2%。对未来的不确定感。', color: '#b1d5c9' },
  { name: '攻读', val: 65, type: '备考类', desc: '整体情绪以中性为主。', color: '#EEE6CB' }, // 牙黄
  { name: '研墨', val: 60, type: '备考类', desc: '整体情绪以中性为主。', color: '#EEE6CB' },
  { name: '经义', val: 55, type: '备考类', desc: '整体情绪以中性为主。', color: '#82B29B' },
  { name: '落笔', val: 50, type: '备考类', desc: '整体情绪以中性为主。', color: '#b1d5c9' },
  { name: '闱后', val: 45, type: '备考类', desc: '整体情绪以中性为主。', color: '#EEE6CB' },

  // --- 成功类 (喜悦为主) ---
  { name: '春风得意', val: 100, type: '成功类', desc: '喜悦情绪占比最高 (68.18%)。直接抒发登科畅快。', color: '#B73F42' }, // 胭脂红 (极其醒目)
  { name: '报喜', val: 90, type: '成功类', desc: '喜悦情绪占 62.0%。放榜后的普遍积极情绪。', color: '#DC6B62' }, // 水红
  { name: '中举', val: 85, type: '成功类', desc: '喜悦情绪占 56.8%。', color: '#DC6B62' },
  { name: '金榜', val: 70, type: '成功类', desc: '喜悦情绪占 42.7%。', color: '#DE9960' }, // 赭石
  { name: '及第', val: 65, type: '成功类', desc: '喜悦情绪占 39.1%。', color: '#DE9960' },

  // --- 失败类 (失落/悲伤为主) ---
  { name: '名落孙山', val: 98, type: '失败类', desc: '失落情绪占比最高 (57.14%)。巨大的打击、沮丧与羞愧。', color: '#436C85' }, // 苍青 (深沉的抑郁感)
  { name: '落第', val: 88, type: '失败类', desc: '失落情绪占 51.2%。', color: '#436C85' },
  { name: '不第', val: 82, type: '失败类', desc: '失落情绪占 48.7%。', color: '#436C85' },
  { name: '下第', val: 78, type: '失败类', desc: '失落情绪占 45.2%。', color: '#436C85' },
  { name: '归乡', val: 60, type: '失败类', desc: '失落情绪占 36.4%。', color: '#DE9960' }  // 赭石 (带有离别的夕阳感)
];

// 将数据转换为力导向图的节点
const nodes = wordData.map(function (item) {
  return {
    name: item.name,
    value: item.val,
    // 核心视觉：水彩气泡效果
    symbolSize: item.val * 1.2, // 气泡大小与词频/重要性挂钩
    itemStyle: {
      color: item.color,
      opacity: 0.65, // 半透明，模仿水彩滴在纸上的通透感
      borderWidth: 0,
      shadowBlur: 25, // 强烈的边缘晕染
      shadowColor: item.color, // 阴影颜色与本体一致，形成发光/晕染效果
      shadowOffsetY: 2
    },
    label: {
      show: true,
      position: 'inside', // 文字在气泡正中间
      formatter: '{b}',
      color: '#5c3a21', // 古风暗褐字体
      fontFamily: 'KaiTi, SimSun, serif',
      fontSize: item.val / 3.5, // 字体大小按比例缩放
      fontWeight: 'bold'
    },
    // 保存详细数据用于 tooltip
    detailDesc: item.desc,
    detailType: item.type
  };
});

option = {
  backgroundColor: 'transparent',
  
  title: {
    text: '清代科举士子情绪词频图谱',
    subtext: '基于1779条落第诗词与科举文献分析',
    left: 'center',
    top: '2%',
    textStyle: {
      fontFamily: 'KaiTi, SimSun, serif',
      fontSize: 24,
      color: '#5c3a21'
    },
    subtextStyle: {
      fontFamily: 'KaiTi, SimSun, serif',
      fontSize: 14,
      color: '#8b6b55',
      lineHeight: 20
    }
  },

  // 古风水墨卷轴提示框
  tooltip: {
    trigger: 'item',
    backgroundColor: 'rgba(244, 238, 224, 0.95)',
    borderColor: '#bca98f',
    borderWidth: 1,
    padding: 15,
    textStyle: {
      color: '#5c3a21',
      fontFamily: 'KaiTi, SimSun, serif',
      fontSize: 14,
      lineHeight: 24
    },
    formatter: function(params) {
      if(params.dataType === 'node') {
        return `<span style="font-size:18px;font-weight:bold;">${params.name}</span><br/>` +
               `<span style="color:#8b6b55;">场景分类：</span>${params.data.detailType}<br/>` +
               `<span style="color:#8b6b55;">情绪特征：</span>${params.data.detailDesc}`;
      }
    }
  },

  series: [
    {
      type: 'graph',
      layout: 'force', // 使用力导向布局，让气泡自然悬浮散开
      force: {
        repulsion: 220, // 气泡之间的排斥力，防止过度重叠
        edgeLength: 10,
        gravity: 0.1  // 往中心靠拢的引力
      },
      roam: false, // 禁用鼠标漫游以防H5中误触滑动
      
      // 添加所有水彩节点数据，不需要连线 (edges)
      data: nodes
    }
  ]
};

    if (option && typeof option === 'object') {
      myChart.setOption(option);
    }

    window.addEventListener('resize', myChart.resize);
  </script>
</body>
</html>
