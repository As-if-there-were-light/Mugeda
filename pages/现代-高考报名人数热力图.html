<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>2026年全国高考报名人数热力图</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@4.9.0/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@4.9.0/map/js/china.js"></script>
    <style>
        /* 预设透明底色，完美融入您的 H5 宣纸背景 */
        body { margin: 0; padding: 0; background-color: transparent; }
        #main { width: 100vw; height: 100vh; min-height: 800px; }
    </style>
</head>
<body>

    <div id="main"></div>

    <script type="text/javascript">
        var myChart = echarts.init(document.getElementById('main'));

        // 2026年各省高考报考人数数据（单位：万人）
        var mapData = [
            { name: '北京', value: 6.0 }, { name: '天津', value: 5.6 },
            { name: '河北', value: 62 }, { name: '山西', value: 33 },
            { name: '内蒙古', value: 21 }, { name: '辽宁', value: 24 },
            { name: '吉林', value: 12.3 }, { name: '黑龙江', value: 18.4 },
            { name: '上海', value: 6.3 }, { name: '江苏', value: 36 },
            { name: '浙江', value: 40 }, { name: '安徽', value: 65 },
            { name: '福建', value: 23 }, { name: '江西', value: 56 },
            { name: '山东', value: 101 }, { name: '河南', value: 136 },
            { name: '湖北', value: 52 }, { name: '湖南', value: 70 },
            { name: '广东', value: 78 }, { name: '广西', value: 61 },
            { name: '海南', value: 7.6 }, { name: '重庆', value: 33 },
            { name: '四川', value: 77 }, { name: '贵州', value: 47 },
            { name: '云南', value: 41 }, { name: '西藏', value: 4.1 },
            { name: '陕西', value: 32 }, { name: '甘肃', value: 24 },
            { name: '青海', value: 4.8 }, { name: '宁夏', value: 6.6 },
            { name: '新疆', value: 23 },
            // 补充占位数据以保证地图完整展示
            { name: '台湾', value: 0 }, { name: '香港', value: 0 }, { name: '澳门', value: 0 }
        ];

        var option = {
            backgroundColor: 'transparent',
            
            title: {
                text: '2026年全国各省高考报名人数图谱',
                subtext: '现代大考的地域竞争烈度（数据单位：万人）',
                left: 'center',
                top: '4%',
                textStyle: { fontFamily: 'KaiTi, SimSun, serif', fontSize: 26, color: '#5c3a21' },
                subtextStyle: { fontFamily: 'KaiTi, SimSun, serif', fontSize: 15, color: '#8b6b55' }
            },

            // 古风宣纸质感交互提示框
            tooltip: {
                trigger: 'item',
                backgroundColor: 'rgba(244, 238, 224, 0.95)',
                borderColor: '#bca98f',
                borderWidth: 1,
                padding: [10, 15],
                textStyle: { color: '#5c3a21', fontFamily: 'KaiTi, SimSun, serif', fontSize: 16 },
                formatter: function (params) {
                    if (params.data && params.data.value > 0) {
                        return `<b style="font-size:20px;">${params.name}</b><br/><br/>` +
                               `报考人数：<span style="color:#B73F42;font-weight:bold;">${params.data.value}</span> 万人`;
                    } else {
                        return `<b style="font-size:18px;">${params.name}</b><br/>暂无统计数据`;
                    }
                }
            },

            // 视觉映射（热力颜色条），严格应用您的专属色卡
            visualMap: {
                min: 0,
                max: 140, // 根据河南136万的最大值设定
                left: '5%',
                bottom: '8%',
                text: ['百万大省', '寥寥数万'],
                calculable: true,
                textStyle: { fontFamily: 'KaiTi, SimSun, serif', color: '#8b6b55', fontSize: 14 },
                inRange: {
                    color: [
                        '#EEE6CB', // 牙黄 (低密度区)
                        '#b1d5c9', // 浅水绿
                        '#82B29B', // 石绿
                        '#DE9960', // 赭石
                        '#DC6B62', // 水红
                        '#B73F42', // 胭脂红
                        '#436C85'  // 苍青 (超高密度大省)
                    ]
                }
            },

            series: [
                {
                    name: '高考报名人数',
                    type: 'map',
                    mapType: 'china', 
                    roam: true, // 允许缩放和平移
                    zoom: 1.2,
                    
                    // 核心需求：水彩无边框晕染配置
                    itemStyle: {
                        normal: {
                            // 极细的半透明白色边框，维持水彩的通透而不粘连
                            borderColor: 'rgba(255, 255, 255, 0.5)',
                            borderWidth: 1,
                            // 暖色系水彩晕染阴影，去除了黑色发脏的可能
                            shadowBlur: 15,
                            shadowColor: 'rgba(222, 153, 96, 0.25)',
                            shadowOffsetX: 0,
                            shadowOffsetY: 5
                        },
                        emphasis: {
                            areaColor: '#DE9960', // 鼠标悬浮时变为赭石金
                            borderWidth: 1,
                            borderColor: '#ffffff',
                            shadowBlur: 20
                        }
                    },
                    
                    label: {
                        normal: { show: false }, // 默认隐藏地名，保持水墨留白的干净感
                        emphasis: {
                            show: true,
                            color: '#5c3a21',
                            fontFamily: 'KaiTi, SimSun, serif',
                            fontWeight: 'bold',
                            fontSize: 14
                        }
                    },
                    data: mapData
                }
            ]
        };

        myChart.setOption(option);

        // 窗口自适应
        window.addEventListener('resize', function () {
            myChart.resize();
        });
    </script>
</body>
</html>
