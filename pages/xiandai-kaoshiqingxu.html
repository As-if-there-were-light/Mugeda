<!DOCTYPE html>
<html lang="en" style="height: 100%">
<head>
  <meta charset="utf-8">
</head>
<body style="height: 100%; margin: 0">
  <div id="container" style="height: 100%"></div>

  
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  
  <!-- Uncomment this line if you want to dataTool extension
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/extension/dataTool.min.js"></script>
  -->
  <!-- Uncomment this line if you want to use gl extension
  <script type="text/javascript" src="https://echarts.apache.org/zh/js/vendors/echarts-gl/dist/echarts-gl.min.js"></script>
  -->
  <!-- Uncomment this line if you want to echarts-stat extension
  <script type="text/javascript" src="https://echarts.apache.org/zh/js/vendors/echarts-stat/dist/ecStat.min.js"></script>
  -->
  <!-- Uncomment this line if you want to echarts-graph-modularity extension
  <script type="text/javascript" src="https://echarts.apache.org/zh/js/vendors/echarts-graph-modularity/dist/echarts-graph-modularity.min.js"></script>
  -->
  <!-- Uncomment this line if you want to use map
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@4.9.0/map/js/world.js"></script>
  -->
  <!-- Uncomment these two lines if you want to use bmap extension
  <script type="text/javascript" src="https://api.map.baidu.com/api?v=3.0&ak=YOUR_API_KEY"></script>
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/extension/bmap.min.js"></script>
  -->

  <script type="text/javascript">
    var dom = document.getElementById('container');
    var myChart = echarts.init(dom, null, {
      renderer: 'canvas',
      useDirtyRect: false
    });
    var app = {};
    
    var option;

    // 1. 高考情绪词频数据
const wordData = [
    { name: '高考', value: 200 }, { name: '焦虑', value: 165 },
    { name: '高三', value: 152 }, { name: '心态', value: 138 },
    { name: '迷茫', value: 115 }, { name: '提分', value: 108 },
    { name: '冲刺', value: 95 }, { name: '压力', value: 88 },
    { name: '上岸', value: 82 }, { name: '内卷', value: 76 },
    { name: '拼搏', value: 72 }, { name: '失眠', value: 68 },
    { name: '减压', value: 65 }, { name: '自救', value: 62 },
    { name: '熬夜', value: 58 }, { name: '重本', value: 55 },
    { name: '成绩', value: 52 }, { name: '时间', value: 48 },
    { name: '极限', value: 45 }, { name: '遗憾', value: 42 },
    { name: '和解', value: 40 }, { name: '沉淀', value: 38 },
    { name: '巨累', value: 35 }, { name: '崩溃', value: 32 },
    { name: '难熬', value: 30 }, { name: '陪伴', value: 28 },
    { name: '清醒', value: 25 }, { name: '十八岁', value: 22 }
];

// 2. 严格应用您专属的新中式色卡
const colors = ['#436C85', '#B73F42', '#DE9960', '#82B29B', '#EEE6CB', '#DC6B62', '#b1d5c9'];

// 3. 将词频数据转换为水彩气泡节点
const nodes = wordData.map(function (item, index) {
    const color = colors[index % colors.length];
    // 针对浅色气泡（牙黄、浅水绿），使用深色文字保证阅读清晰度
    const textColor = (color === '#EEE6CB' || color === '#b1d5c9') ? '#5c3a21' : '#ffffff';
    
    return {
        name: item.name,
        value: item.value,
        // 气泡大小与词频权重挂钩
        symbolSize: item.value * 0.7 + 20, 
        itemStyle: {
            color: color,
            borderWidth: 0,
            opacity: 0.8, // 模拟水彩的半透明感
            shadowBlur: 25, 
            shadowColor: color, // 使用自身颜色作为晕染发光，拒绝黑色脏阴影
            shadowOffsetY: 2
        },
        label: {
            show: true,
            formatter: '{b}',
            fontFamily: 'KaiTi, SimSun, serif',
            fontSize: Math.max(item.value * 0.18 + 10, 12), // 字体大小随气泡缩放
            color: textColor,
            fontWeight: 'bold'
        }
    };
});

// 4. Echarts 渲染配置
option = {
    // 预设透明底色，无缝融入您的 H5 宣纸背景
    backgroundColor: 'transparent',
    
    title: {
        text: '现代大考情绪词云图谱',
        subtext: '基于高考群体社交媒体文本分析',
        left: 'center',
        top: '2%',
        textStyle: { fontFamily: 'KaiTi, SimSun, serif', fontSize: 26, color: '#5c3a21' },
        subtextStyle: { fontFamily: 'KaiTi, SimSun, serif', fontSize: 15, color: '#8b6b55' }
    },

    // 古风卷轴提示框
    tooltip: {
        trigger: 'item',
        backgroundColor: 'rgba(244, 238, 224, 0.95)',
        borderColor: '#bca98f',
        borderWidth: 1,
        padding: [10, 15],
        textStyle: { fontFamily: 'KaiTi, SimSun, serif', color: '#5c3a21', fontSize: 16 },
        formatter: function(params) {
            return `<b style="font-size:18px;">${params.name}</b><br/>提及权重：${params.value}`;
        }
    },

    series: [{
        type: 'graph',
        layout: 'force', // 启用原生力导向布局
        force: {
            repulsion: 180, // 排斥力，让气泡自然散开不重叠
            edgeLength: 10,
            gravity: 0.08   // 引力，让气泡向中心聚拢成圆形云团
        },
        roam: false, // 关闭漫游，防止在H5手机端滑动时误触
        data: nodes
    }]
};

    if (option && typeof option === 'object') {
      myChart.setOption(option);
    }

    window.addEventListener('resize', myChart.resize);
  </script>
</body>
</html>
