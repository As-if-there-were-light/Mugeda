  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  
  <!-- Uncomment this line if you want to dataTool extension
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/extension/dataTool.min.js"></script>

  -->
  <!-- Uncomment this line if you want to echarts-stat extension
  <script type="text/javascript" src="https://echarts.apache.org/zh/js/vendors/echarts-stat/dist/ecStat.min.js"></script>
  -->
  <!-- Uncomment this line if you want to echarts-graph-modularity extension
  <script type="text/javascript" src="https://echarts.apache.org/zh/js/vendors/echarts-graph-modularity/dist/echarts-graph-modularity.min.js"></script>
  -->
  <!-- Uncomment this line if you want to use map

  -->
  <!-- Uncomment these two lines if you want to use bmap extension
  <script type="text/javascript" src="https://api.map.baidu.com/api?v=3.0&ak=YOUR_API_KEY"></script>
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/extension/bmap.min.js"></script>
  -->

  <script type="text/javascript">
    var dom = document.getElementById('container');
    var myChart = echarts.init(dom, null, {
      renderer: 'canvas',
      useDirtyRect: false
    });
    var app = {};
    
    var option;

    option = {
  // 预设透明背景，完美融入您的水彩H5底图
  backgroundColor: 'transparent',
  
  // 标题：古风排版
  title: {
    text: '全国高考报名总人数趋势 (2015-2030)',
    subtext: '注：2026年至2030年为预估数据\n数据单位：万人',
    left: 'center',
    top: '2%',
    textStyle: {
      fontFamily: 'KaiTi, SimSun, serif',
      fontSize: 22,
      color: '#5c3a21', // 暗褐墨色
      fontWeight: 'normal'
    },
    subtextStyle: {
      fontFamily: 'KaiTi, SimSun, serif',
      fontSize: 14,
      color: '#8b6b55',
      lineHeight: 20
    }
  },
  
  // 提示框：宣纸卷轴风格
  tooltip: {
    trigger: 'axis',
    backgroundColor: 'rgba(244, 238, 224, 0.9)', 
    borderColor: '#bca98f',
    borderWidth: 1,
    textStyle: {
      color: '#5c3a21',
      fontFamily: 'KaiTi, SimSun, serif',
      fontSize: 15
    },
    formatter: '{b} : {c} 万人'
  },
  
  // 调整画布留白
  grid: {
    left: '8%',
    right: '8%',
    bottom: '12%',
    top: '22%',
    containLabel: true
  },
  
  // X轴：年份
  xAxis: {
    type: 'category',
    boundaryGap: false, // 面积图特有配置，让图表贴紧Y轴边缘
    data: [
      '2015年', '2016年', '2017年', '2018年', '2019年', 
      '2020年', '2021年', '2022年', '2023年', '2024年', 
      '2025年', '2026年\n(预测)', '2027年\n(预测)', '2028年\n(预测)', '2029年\n(预测)', '2030年\n(预测)'
    ],
    axisLine: { show: false },
    axisTick: { show: false },
    axisLabel: {
      fontFamily: 'KaiTi, SimSun, serif',
      color: '#8b6b55',
      fontSize: 12,
      margin: 15
    }
  },
  
  // Y轴：数值。为了让趋势起伏更明显，设置最小值
  yAxis: {
    type: 'value',
    name: '(万人)',
    min: 800, // 从800万起算，避免底部留白过多，让山峰陡峭感更强
    nameTextStyle: {
      fontFamily: 'KaiTi, SimSun, serif',
      color: '#8b6b55',
      align: 'right'
    },
    axisLine: { show: false },
    axisTick: { show: false },
    axisLabel: {
      fontFamily: 'KaiTi, SimSun, serif',
      color: '#8b6b55'
    },
    splitLine: {
      lineStyle: {
        type: 'dashed',
        color: 'rgba(139, 107, 85, 0.15)' // 极淡的古风参考线
      }
    }
  },
  
  // 核心数据与图形层
  series: [
    {
      name: '高考报名人数',
      type: 'line',
      smooth: true, // 平滑曲线，模拟水墨走势
      symbol: 'circle',
      symbolSize: 6, // 缩小数据点，凸显面积图的整体感
      showSymbol: false, // 默认隐藏圆点，鼠标悬浮时才显示，保持画面干净
      
      // 线条样式
      itemStyle: {
        color: '#DC6B62', // 水红/珊瑚红
      },
      lineStyle: {
        width: 3,
        color: '#DC6B62',
        shadowBlur: 10,
        shadowColor: 'rgba(220, 107, 98, 0.4)', // 线条自带水彩晕染光晕
        shadowOffsetY: 4
      },
      
      // 水彩晕染渐变面积（重点配置）
      areaStyle: {
        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
          {
            offset: 0,
            color: 'rgba(220, 107, 98, 0.7)' // 顶部：较浓的水红色
          },
          {
            offset: 1,
            color: 'rgba(238, 230, 203, 0.1)' // 底部：融入宣纸底色 (#EEE6CB)
          }
        ])
      },
      
      // 添加实际数据与预测数据的分界线
      markLine: {
        symbol: ['none', 'none'],
        label: {
          show: true,
          position: 'start',
          formatter: '预\n测',
          color: '#82B29B', // 石绿
          fontFamily: 'KaiTi, SimSun, serif',
          fontSize: 14
        },
        lineStyle: {
          type: 'dashed',
          color: '#82B29B', // 用石绿色画出虚线分界
          width: 2,
          opacity: 0.7
        },
        data: [
          { xAxis: '2025年' } // 以2025作为分界线打点
        ]
      },
      
      // 准确填入图片中的数据
      data: [
        942, 940, 940, 975, 1031, 
        1071, 1078, 1193, 1291, 1342, 
        1335, 1389, 1416, 1388, 1423, 1548
      ]
    }
  ]
};

    if (option && typeof option === 'object') {
      myChart.setOption(option);
    }

    window.addEventListener('resize', myChart.resize);
  </script>
</body>
</html>
