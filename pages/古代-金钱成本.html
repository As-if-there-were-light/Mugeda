  <script type="text/javascript">
    var dom = document.getElementById('container');

      renderer: 'svg',
      useDirtyRect: false
    });
    var app = {};
    
    var option;

    option = {
  // 预设透明背景，方便后期叠加入H5的水彩底图中
  backgroundColor: 'transparent',
  
  // 标题设置：使用古风字体
  title: {
    text: '清代童试总体费用估算',
    subtext: '完整参加一次童试（县试+府试+院试）约需十两白银\n注：图表数值为依史料描述的概数估算',
    left: 'center',
    top: '2%',
    textStyle: {
      fontFamily: 'KaiTi, SimSun, serif',
      fontSize: 22,
      color: '#5c3a21', // 沉稳的暗褐/墨色
      fontWeight: 'normal'

    subtextStyle: {
      fontFamily: 'KaiTi, SimSun, serif',

      color: '#8b6b55',
      lineHeight: 20

  // 提示框：水墨卷轴风格
  tooltip: {
    trigger: 'axis',

    borderWidth: 1,
    textStyle: {

      fontFamily: 'KaiTi, SimSun, serif'

    formatter: '{b} : 约 {c} 两白银'
  },
  
  // 画布边距调整

    top: '20%',
    containLabel: true

    type: 'value',

      fontFamily: 'KaiTi, SimSun, serif',
      color: '#8b6b55',
      align: 'right'
    },
    splitLine: { show: false }, // 隐藏网格线，增强水彩画的留白感
    axisLine: { show: false },
    axisTick: { show: false },
    axisLabel: {
      fontFamily: 'KaiTi, SimSun, serif',
      color: '#8b6b55'
    }
  },
  
  // Y轴（纵轴，代表费用项目）：去除线条，只保留文字

    axisLine: { show: false },

    axisLabel: {
      fontFamily: 'KaiTi, SimSun, serif',
      color: '#5c3a21',
      fontSize: 14
    }

  series: [
    {
      name: '费用估算',
      type: 'bar',
      barWidth: '40%', // 控制柱子粗细
      
      // 为每一根柱子分配你指定的“新中式”颜色

        borderRadius: [0, 10, 10, 0], // 横向柱状图，只让右边呈现圆角
        borderWidth: 0,
        shadowBlur: 15, // 水彩边缘晕染效果
        shadowColor: 'rgba(0, 0, 0, 0.15)',
        shadowOffsetX: 2,
        shadowOffsetY: 3,
        // 根据数据索引动态分配颜色

            var colorList = [
                '#b1d5c9', // 浅水绿 (试卷费)
                '#82B29B', // 石绿 (交通费)
                '#EEE6CB', // 牙黄 (其他杂费)
                '#DE9960', // 赭石 (住宿饮食)
                '#B73F42'  // 胭脂红 (担保费)
            ];
            return colorList[params.dataIndex];
        }
      },
      
      // 在柱子右侧显示具体数字
      label: {
        show: true,
        position: 'right',
        formatter: '{c} 两',
        fontFamily: 'KaiTi, SimSun, serif',
        color: '#5c3a21',
        fontSize: 14

      data: [0.8, 1, 1.2, 3, 4] 
    }
  ]
