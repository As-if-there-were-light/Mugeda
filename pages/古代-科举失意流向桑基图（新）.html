<!DOCTYPE html>
<html lang="en" style="height: 100%">
<head>
  <meta charset="utf-8">
</head>
<body style="height: 100%; margin: 0">
  <div id="container" style="height: 100%"></div>

  
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  
  <!-- Uncomment this line if you want to dataTool extension
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/extension/dataTool.min.js"></script>
  -->
  <!-- Uncomment this line if you want to use gl extension
  <script type="text/javascript" src="https://echarts.apache.org/zh/js/vendors/echarts-gl/dist/echarts-gl.min.js"></script>
  -->
  <!-- Uncomment this line if you want to echarts-stat extension
  <script type="text/javascript" src="https://echarts.apache.org/zh/js/vendors/echarts-stat/dist/ecStat.min.js"></script>
  -->
  <!-- Uncomment this line if you want to echarts-graph-modularity extension
  <script type="text/javascript" src="https://echarts.apache.org/zh/js/vendors/echarts-graph-modularity/dist/echarts-graph-modularity.min.js"></script>
  -->
  <!-- Uncomment this line if you want to use map
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@4.9.0/map/js/world.js"></script>
  -->
  <!-- Uncomment these two lines if you want to use bmap extension
  <script type="text/javascript" src="https://api.map.baidu.com/api?v=3.0&ak=YOUR_API_KEY"></script>
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/extension/bmap.min.js"></script>
  -->

  <script type="text/javascript">
    var dom = document.getElementById('container');
    var myChart = echarts.init(dom, null, {
      renderer: 'canvas',
      useDirtyRect: false
    });
    var app = {};
    
    var option;

    // 1. 全链路同色映射表
const colorMap = {
  '林则徐': '#436C85', '左宗棠': '#436C85', 
  '教育执教': '#436C85', '经世致用': '#436C85', 
  '培养人才·传承学术': '#436C85', '国防建设·地方治理': '#436C85',
  
  '龚自珍': '#B73F42', '归有光': '#B73F42', '汤显祖': '#B73F42', 
  '文学创作': '#B73F42', '思想启蒙·艺术创新': '#B73F42',
  
  '谢崧岱': '#82B29B', '实业创新': '#82B29B', '技术革新·商业成功': '#82B29B'
};

// 2. 生成节点并应用无边框水彩晕染风格
const nodes = Object.keys(colorMap).map(function(name) {
  return {
    name: name,
    itemStyle: {
      color: colorMap[name],
      borderWidth: 0, 
      shadowBlur: 20,
      shadowColor: colorMap[name], // 自身颜色发光晕染
      shadowOffsetY: 2
    }
  };
});

// 3. 历史人物流向数据（保留底层的权重值以支撑线条粗细）
const links = [
  { source: '林则徐', target: '教育执教', value: 5 },
  { source: '林则徐', target: '经世致用', value: 5 },
  { source: '左宗棠', target: '教育执教', value: 5 },
  { source: '左宗棠', target: '经世致用', value: 5 },
  { source: '教育执教', target: '培养人才·传承学术', value: 10 },
  { source: '经世致用', target: '国防建设·地方治理', value: 10 },

  { source: '龚自珍', target: '文学创作', value: 5 },
  { source: '归有光', target: '文学创作', value: 5 },
  { source: '汤显祖', target: '文学创作', value: 5 },
  { source: '文学创作', target: '思想启蒙·艺术创新', value: 15 },

  { source: '谢崧岱', target: '实业创新', value: 8 },
  { source: '实业创新', target: '技术革新·商业成功', value: 8 }
];

option = {
  backgroundColor: 'transparent',

  title: {
    text: '清代科举失意者后续流向图谱',
    subtext: '落第不失志：考场之外的时代回响',
    left: 'center',
    top: '2%',
    textStyle: {
      fontFamily: 'KaiTi, SimSun, serif',
      fontSize: 26,
      color: '#5c3a21' 
    },
    subtextStyle: {
      fontFamily: 'KaiTi, SimSun, serif',
      fontSize: 15,
      color: '#8b6b55',
      lineHeight: 22
    }
  },

  // 核心修改 1：重写提示框格式，彻底隐藏任何数字的显示
  tooltip: {
    trigger: 'item',
    backgroundColor: 'rgba(244, 238, 224, 0.95)', 
    borderColor: '#bca98f',
    borderWidth: 1,
    padding: [10, 15],
    textStyle: {
      color: '#5c3a21',
      fontFamily: 'KaiTi, SimSun, serif',
      fontSize: 15
    },
    formatter: function(params) {
      // 如果鼠标悬浮在连线上，只显示：始发节点 ➔ 目标节点
      if (params.dataType === 'edge') {
        return `<span style="color:#8b6b55;">流向：</span><b>${params.data.source}</b> ➔ <b>${params.data.target}</b>`;
      }
      // 如果鼠标悬浮在节点上，只显示节点名称
      return `<b>${params.name}</b>`;
    }
  },

  series: [
    {
      type: 'sankey',
      layout: 'none',
      top: '15%',
      bottom: '10%',
      left: '5%',
      right: '22%', 
      nodeGap: 25,  
      nodeWidth: 10, 
      
      data: nodes,
      links: links,

      lineStyle: {
        color: 'source', 
        opacity: 0.35,   // 半透明展现水彩通透感
        curveness: 0.5   
      },

      // 核心修改 2：显式指定标签格式，确保页面上只显示文本不带数字
      label: {
        position: 'right', 
        fontFamily: 'KaiTi, SimSun, serif',
        fontSize: 15,
        color: '#5c3a21',
        fontWeight: 'bold',
        formatter: '{b}' // '{b}' 含义为只抽取名称（Name），从而屏蔽数字
      }
    }
  ]
};

    if (option && typeof option === 'object') {
      myChart.setOption(option);
    }

    window.addEventListener('resize', myChart.resize);
  </script>
</body>
</html>
